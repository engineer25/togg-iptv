<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Togg IPTV Pro - Engineer Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --primary: #00d2ff; --bg: #0f172a; --sidebar: #1e293b; --text: #f8fafc; --fav: #fbbf24; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* Yan Menü Tasarımı */
        #sidebar { width: 350px; background: var(--sidebar); display: flex; flex-direction: column; border-right: 1px solid #334155; box-shadow: 5px 0 15px rgba(0,0,0,0.3); z-index: 10; }
        .controls-area { padding: 20px; border-bottom: 1px solid #334155; display: flex; flex-direction: column; gap: 12px; background: #111827; }
        
        select, input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 14px; box-sizing: border-box; outline: none; transition: 0.3s; }
        select:focus, input:focus { border-color: var(--primary); box-shadow: 0 0 8px rgba(0, 210, 255, 0.2); }
        
        .list-container { flex: 1; overflow-y: auto; padding: 10px; scrollbar-width: thin; scrollbar-color: var(--primary) transparent; }
        .section-title { font-size: 12px; font-weight: bold; color: var(--primary); margin: 20px 5px 8px 5px; text-transform: uppercase; letter-spacing: 1.5px; display: flex; align-items: center; gap: 8px; }
        
        .channel-item { display: flex; align-items: center; padding: 12px; margin-bottom: 6px; border-radius: 10px; background: #2d3748; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .channel-item:hover { background: #3d495d; border-color: var(--primary); transform: translateX(5px); }
        .channel-name { flex: 1; font-size: 13.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .fav-btn { font-size: 22px; color: #4b5563; cursor: pointer; padding-left: 10px; transition: 0.2s; user-select: none; }
        .fav-btn.is-fav { color: var(--fav); filter: drop-shadow(0 0 3px rgba(251, 191, 36, 0.4)); }
        
        .active { border-left: 6px solid var(--primary); background: #1a202c !important; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }

        /* Video Oynatıcı Alanı */
        #main { flex: 1; display: flex; background: #000; position: relative; flex-direction: column; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; color: var(--primary); font-weight: bold; background: rgba(15, 23, 42, 0.9); padding: 25px 40px; border-radius: 15px; border: 1px solid var(--primary); z-index: 100; text-align: center; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="controls-area">
        <select id="groupSelect" onchange="updateUI()">
            <option value="all">Kategoriler Yükleniyor...</option>
        </select>
        <input type="text" id="searchInput" placeholder="Kanal ismi ile ara..." onkeyup="updateUI()">
    </div>
    
    <div class="list-container">
        <div class="section-title">⭐ FAVORİLERİM</div>
        <div id="favList"></div>
        
        <div class="section-title">📺 TÜM KANALLAR</div>
        <div id="channelList">Lütfen bekleyin, liste hazırlanıyor...</div>
    </div>
</div>

<div id="main">
    <div id="loader">SİSTEM YÜKLENİYOR...</div>
    <video id="video" controls autoplay playsinline></video>
</div>

<script>
    // ==========================================
    // BURAYA M3U LINKINIZI YAPIŞTIRIN
    const M3U_URL = 'http://iptv3.tjurkx.com/get.php?username=han9lvy81&password=kDvnGqzP&type=m3u_plus&output=mpegts'; 
    // ==========================================

    const video = document.getElementById('video');
    const channelList = document.getElementById('channelList');
    const favList = document.getElementById('favList');
    const groupSelect = document.getElementById('groupSelect');
    const loader = document.getElementById('loader');
    
    let allChannels = [];
    let favorites = JSON.parse(localStorage.getItem('togg_favs')) || [];
    let hls = new Hls();

    async function init() {
        if (!M3U_URL || M3U_URL.includes('BURAYA')) {
            channelList.innerHTML = "<div style='color:orange; padding:10px;'>Hata: Lütfen kodun içindeki M3U_URL kısmına linkinizi ekleyin!</div>";
            return;
        }

        loader.style.display = 'block';
        try {
            // CORS Proxy Köprüsü (AllOrigins kullanarak engelleri aşıyoruz)
            const proxyUrl = 'https://api.allorigins.win/raw?url=';
            const targetUrl = encodeURIComponent(M3U_URL);
            
            const response = await fetch(proxyUrl + targetUrl);
            if (!response.ok) throw new Error('Sunucu yanıt vermedi. Linki kontrol edin.');
            
            const data = await response.text();
            parseM3U(data);
        } catch (e) {
            console.error(e);
            channelList.innerHTML = `<div style="color:#ff4444; padding:15px;"><b>Bağlantı Hatası!</b><br><small>${e.message}</small></div>`;
        } finally {
            loader.style.display = 'none';
        }
    }

    function parseM3U(data) {
        const lines = data.split('\n');
        const groups = new Set();
        allChannels = [];
        let currentChannel = null;

        lines.forEach(line => {
            line = line.trim();
            if (line.startsWith('#EXTINF:')) {
                const groupMatch = line.match(/group-title="([^"]+)"/);
                const groupName = groupMatch ? groupMatch[1] : "Genel";
                const title = line.split(',').pop().trim() || "İsimsiz Kanal";
                currentChannel = { title, group: groupName };
                groups.add(groupName);
            } else if (line.startsWith('http') && currentChannel) {
                currentChannel.url = line;
                allChannels.push(currentChannel);
                currentChannel = null;
            }
        });

        // Kategorileri doldur
        groupSelect.innerHTML = '<option value="all">Tüm Kategoriler</option>';
        Array.from(groups).sort().forEach(g => {
            const opt = document.createElement('option');
            opt.value = g; opt.innerText = g;
            groupSelect.appendChild(opt);
        });

        updateUI();
    }

    function createItem(ch) {
        const div = document.createElement('div');
        div.className = 'channel-item';
        const isFav = favorites.includes(ch.url);
        
        div.innerHTML = `
            <div class="channel-name">${ch.title}</div>
            <div class="fav-btn ${isFav ? 'is-fav' : ''}" onclick="toggleFav(event, '${ch.url}')">★</div>
        `;
        
        div.onclick = () => play(ch.url, div);
        return div;
    }

    function updateUI() {
        const selectedGroup = groupSelect.value;
        const query = document.getElementById('searchInput').value.toLowerCase();
        
        // Favorileri Güncelle
        favList.innerHTML = '';
        const favChannels = allChannels.filter(c => favorites.includes(c.url));
        if (favChannels.length === 0) favList.innerHTML = '<div style="padding:10px; font-size:12px; color:#666;">Yıldız simgesiyle favori ekleyin.</div>';
        favChannels.forEach(ch => favList.appendChild(createItem(ch)));

        // Ana Listeyi Güncelle
        channelList.innerHTML = '';
        const filtered = allChannels.filter(c => 
            (selectedGroup === 'all' || c.group === selectedGroup) && 
            c.title.toLowerCase().includes(query)
        );
        
        // Performans için ilk 300 kanalı göster (Togg tarayıcısını yormamak için)
        filtered.slice(0, 300).forEach(ch => channelList.appendChild(createItem(ch)));
        
        if (filtered.length === 0) channelList.innerHTML = '<div style="padding:20px; color:#888;">Kanal bulunamadı.</div>';
    }

    function toggleFav(event, url) {
        event.stopPropagation();
        if (favorites.includes(url)) {
            favorites = favorites.filter(f => f !== url);
        } else {
            favorites.push(url);
        }
        localStorage.setItem('togg_favs', JSON.stringify(favorites));
        updateUI();
    }

    function play(url, el) {
        document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        loader.innerText = "KANAL YÜKLENİYOR...";
        loader.style.display = 'block';

        if (Hls.isSupported()) {
            hls.destroy();
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play().catch(() => {
                    loader.innerText = "Oynatmak için videoya dokunun!";
                });
                loader.style.display = 'none';
            });
            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    loader.innerText = "YAYIN AÇILAMADI!";
                    loader.style.display = 'block';
                }
            });
        } else {
            video.src = url;
            loader.style.display = 'none';
        }
    }

    init();
</script>
</body>
</html>
