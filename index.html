<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Togg IPTV Pro</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>

<style>
body { margin:0; display:flex; height:100vh; background:#000; color:#fff; font-family:sans-serif;}
#sidebar { width:320px; background:#111; overflow:auto; padding:10px;}
.channel { padding:10px; border-bottom:1px solid #333; cursor:pointer; }
.channel:hover { background:#222; }
#main { flex:1; display:flex; justify-content:center; align-items:center; position:relative;}
video { width:100%; height:100%; background:#000; }
input, button {
  width:100%; padding:12px; margin-bottom:10px;
  border:none; border-radius:6px;
}
button { background:#00d2ff; font-weight:bold; cursor:pointer; }
#status {
  position:absolute; top:10px; left:10px;
  background:rgba(0,0,0,0.7); padding:6px 10px;
  font-size:12px; border-radius:6px;
}
</style>
</head>

<body>

<div id="sidebar">
  <input id="server" placeholder="Server (http://...)">
  <input id="user" placeholder="Username">
  <input id="pass" placeholder="Password">
  <button onclick="loadChannels()">BAĞLAN</button>
  <div id="list">Bağlanılmadı</div>
</div>

<div id="main">
  <video id="video" controls autoplay playsinline></video>
  <div id="status">Hazır</div>
</div>

<script>
const video = document.getElementById("video");
const list = document.getElementById("list");
const status = document.getElementById("status");

// 🔥 BURAYI DEĞİŞTİR
const proxy = "https://dawn-snow-526f.hansebahattin.workers.dev/?url=";

let hls = null;

function setStatus(msg, color="white") {
  status.innerText = msg;
  status.style.color = color;
}

async function loadChannels() {
  const server = document.getElementById("server").value;
  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  const api = `${server}/player_api.php?username=${user}&password=${pass}&action=get_live_streams`;

  setStatus("Kanal listesi alınıyor...");

  try {
    const res = await fetch(proxy + encodeURIComponent(api));
    const data = await res.json();

    list.innerHTML = "";

    data.slice(0,200).forEach(ch => {
      const div = document.createElement("div");
      div.className = "channel";
      div.innerText = ch.name;
      div.onclick = () => play(server, user, pass, ch.stream_id);
      list.appendChild(div);
    });

    setStatus("Kanallar yüklendi ✅");
  } catch(e) {
    setStatus("Liste hatası ❌", "red");
  }
}

function play(server, user, pass, id) {
  const url = `${server}/live/${user}/${pass}/${id}.m3u8`;

  setStatus("Bağlanıyor...");

  if (hls) hls.destroy();

  if (Hls.isSupported()) {
    hls = new Hls({
      maxBufferLength: 30,
      xhrSetup: function(xhr, url2) {
        xhr.open("GET", proxy + encodeURIComponent(url2), true);
      }
    });

    hls.loadSource(proxy + encodeURIComponent(url));
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      setStatus("Yayın başladı ✅");
      video.play().catch(() => {
        setStatus("Play için dokun", "orange");
      });
    });

    hls.on(Hls.Events.ERROR, (event, data) => {
      if (data.fatal) {
        setStatus("Hata: " + data.details, "red");
      }
    });

  } else {
    video.src = proxy + encodeURIComponent(url);
  }
}
</script>

</body>
</html>
