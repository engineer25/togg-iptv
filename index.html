<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Togg IPTV - Engineer Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --primary: #00d2ff; --bg: #0f172a; --sidebar: #1e293b; --text: #f8fafc; --fav: #fbbf24; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 320px; background: var(--sidebar); display: flex; flex-direction: column; border-right: 1px solid #334155; }
        .controls-area { padding: 15px; border-bottom: 1px solid #334155; display: flex; flex-direction: column; gap: 8px; }
        select, input { width: 100%; padding: 10px; border-radius: 5px; border: none; background: #0f172a; color: white; font-size: 14px; outline: none; }
        .list-container { flex: 1; overflow-y: auto; padding: 10px; }
        .channel-item { display: flex; align-items: center; padding: 10px; margin-bottom: 5px; border-radius: 6px; background: #2d3748; cursor: pointer; font-size: 13px; border: 1px solid transparent; }
        .channel-item:hover { background: #3d495d; border-color: var(--primary); }
        .active { border-left: 5px solid var(--primary); background: #1a202c !important; }
        .fav-btn { margin-left: auto; color: #666; font-size: 20px; }
        .is-fav { color: var(--fav); }

        #main { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }
        video { flex: 1; width: 100%; height: 100%; background: #000; }
        
        #debug-panel { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.85); color: #00ff00; font-family: monospace; font-size: 11px; padding: 10px; border-top: 1px solid #333; max-height: 120px; overflow-y: auto; pointer-events: none; }
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; color: var(--primary); text-align: center; background: rgba(0,0,0,0.9); padding: 25px; border-radius: 15px; border: 1px solid var(--primary); z-index: 100; }
        .btn-retry { margin-top: 10px; padding: 10px 20px; background: var(--primary); color: #000; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; pointer-events: auto; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="controls-area">
        <select id="groupSelect" onchange="updateUI()"></select>
        <input type="text" id="searchInput" placeholder="Kanal ara..." onkeyup="updateUI()">
    </div>
    <div class="list-container">
        <div id="favList"></div>
        <div id="channelList">Yükleniyor...</div>
    </div>
</div>

<div id="main">
    <video id="video" controls autoplay playsinline></video>
    <div id="loader">İŞLENİYOR...</div>
    <div id="debug-panel">Sistem Hazır.</div>
</div>

<script>
    const M3U_URL = 'liste.m3u'; 
    const video = document.getElementById('video');
    const debug = document.getElementById('debug-panel');
    const loader = document.getElementById('loader');
    let allChannels = [];
    let favorites = JSON.parse(localStorage.getItem('togg_favs')) || [];
    let hls = new Hls();

    function log(msg, color = "#00ff00") {
        debug.innerHTML += `<div style="color:${color}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
        debug.scrollTop = debug.scrollHeight;
    }

    async function init() {
        log("Liste okunuyor...");
        try {
            const res = await fetch(M3U_URL);
            const data = await res.text();
            parseM3U(data);
            log("Liste yüklendi. Kanal: " + allChannels.length);
        } catch (e) {
            log("Hata: " + e.message, "red");
        }
    }

    function parseM3U(data) {
        const lines = data.split('\n');
        const groups = new Set();
        let current = null;
        lines.forEach(l => {
            l = l.trim();
            if (l.startsWith('#EXTINF:')) {
                const gm = l.match(/group-title="([^"]+)"/);
                current = { title: l.split(',').pop().trim(), group: gm ? gm[1] : "Genel" };
                groups.add(current.group);
            } else if (l.startsWith('http') && current) {
                current.url = l;
                allChannels.push(current);
                current = null;
            }
        });
        const gs = document.getElementById('groupSelect');
        gs.innerHTML = '<option value="all">Tüm Kategoriler</option>';
        Array.from(groups).sort().forEach(g => gs.innerHTML += `<option value="${g}">${g}</option>`);
        updateUI();
    }

    function updateUI() {
        const g = document.getElementById('groupSelect').value;
        const s = document.getElementById('searchInput').value.toLowerCase();
        const cl = document.getElementById('channelList');
        cl.innerHTML = '';
        allChannels.filter(c => (g==='all' || c.group===g) && c.title.toLowerCase().includes(s)).slice(0,250).forEach(c => {
            const div = document.createElement('div');
            div.className = 'channel-item';
            div.innerHTML = `<span>${c.title}</span><span class="fav-btn ${favorites.includes(c.url)?'is-fav':''}">★</span>`;
            div.onclick = () => play(c.url, div);
            cl.appendChild(div);
        });
    }

    function play(url, el) {
        log("Bağlantı kuruluyor: " + url);
        loader.style.display = 'block';
        loader.innerHTML = "YÜKLENİYOR...";

        if (Hls.isSupported()) {
            hls.destroy();
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                log("Yayın yakalandı. Başlatılıyor...");
                video.play().then(() => {
                    loader.style.display = 'none';
                }).catch(e => {
                    log("Auto-play engellendi. Dokunun.", "orange");
                    loader.innerHTML = 'OYNATMAK İÇİN DOKUNUN<br><button class="btn-retry" onclick="video.play(); document.getElementById(\'loader\').style.display=\'none\';">OYNAT</button>';
                });
            });

            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    log("YAYIN HATASI: " + data.details, "#ff4444");
                    loader.innerHTML = `YAYIN AÇILAMADI!<br><small>${data.details}</small><br><button class="btn-retry" onclick="window.open('${url}')">DIŞARIDA DENE</button>`;
                }
            });
        } else {
            video.src = url;
            log("Native HLS deneniyor...");
        }
    }

    init();
</script>
</body>
</html>
